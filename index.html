<script>
	// Don't show the lovable-badge if the page is in an iframe or if it's being rendered by puppeteer (screenshot service)
	if (window.self !== window.top || navigator.userAgent.includes('puppeteer')) {
		// the page is in an iframe
		var badge = document.getElementById('lovable-badge');
		if (badge) {
			badge.style.display = 'none';
		}
	}

	// Add click event listener to close button with animation
	var closeButton = document.getElementById('lovable-badge-close');
	if (closeButton) {
		closeButton.addEventListener('click', function(event) {
			event.preventDefault();
			event.stopPropagation();
			var badge = document.getElementById('lovable-badge');
			if (badge) {
				badge.classList.add('closing');
				setTimeout(function() {
					if (badge) {
						badge.style.display = 'none';
					}
				}, 240);
			}
		});
	}
</script>

<script>
(function() {
  // Only show intro once per session
  if (sessionStorage.getItem('gt_intro_done')) {
    document.getElementById('gildtech-intro-overlay').style.display = 'none';
    return;
  }
  
  // Intro JS - modified enterSite to hide overlay instead of redirect
  
const NANO_BANANA_URL='https://tempfile.aiquickdraw.com/na2/751b6d8c2cb9bb5be5ead568f49197ba1686051.jpeg';
const logoImg=document.getElementById('logoImg');
if(NANO_BANANA_URL){const t=new Image();t.onload=()=>{logoImg.src=NANO_BANANA_URL;logoImg.style.mixBlendMode='normal';logoImg.style.width='210px';logoImg.style.height='210px';logoImg.style.borderRadius='50%';};t.src=NANO_BANANA_URL;}
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},60);});
const ptcl=document.getElementById('particles');
for(let i=0;i<28;i++){const p=document.createElement('div');p.className='p';const s=Math.random()*3+1;p.style.cssText='left:'+Math.random()*100+'%;bottom:'+Math.random()*20+'%;width:'+s+'px;height:'+s+'px;animation-duration:'+(6+Math.random()*8)+'s;animation-delay:'+Math.random()*8+'s;';ptcl.appendChild(p);}
document.addEventListener('click',e=>{const pop=document.createElement('div');pop.className='pop';pop.style.left=e.clientX+'px';pop.style.top=e.clientY+'px';for(let i=0;i<12;i++){const d=document.createElement('div');d.className='pop-dot';const a=(i/12)*Math.PI*2,dist=40+Math.random()*50;d.style.setProperty('--ex',Math.cos(a)*dist+'px');d.style.setProperty('--ey',Math.sin(a)*dist+'px');d.style.background=i%3===0?'#e891b0':'var(--rose)';pop.appendChild(d);}document.getElementById('gildtech-intro-overlay').appendChild(pop);setTimeout(()=>pop.remove(),700);});
document.addEventListener('mousemove',e=>{const cx=window.innerWidth/2,cy=window.innerHeight/2,dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy;document.querySelector('#gildtech-intro-overlay .stage').style.transform='translate('+dx*8+'px,'+dy*6+'px)';});
const circle=document.getElementById('progressCircle');let count=8,timer=null;
function startCountdown(){const cdEl=document.getElementById('countdown');if(circle){circle.style.transition='stroke-dashoffset 8s linear';circle.style.strokeDashoffset='0';}timer=setInterval(()=>{count--;if(cdEl)cdEl.textContent=count;if(count<=0){clearInterval(timer);enterSite();}},1000);}
setTimeout(startCountdown,3800);
function enterSite(){clearInterval(timer);document.getElementById('exitOverlay').classList.add('active');cursor.style.transform='translate(-50%,-50%) scale(30)';cursor.style.opacity='0';cursor.style.transition='transform .8s ease,opacity .8s';setTimeout(()=>{sessionStorage.setItem('gt_intro_done','1'); var ov=document.getElementById('gildtech-intro-overlay'); ov.style.transition='opacity .4s'; ov.style.opacity='0'; setTimeout(function(){ov.style.display='none';document.body.style.cursor='';},450);},850);}
document.getElementById('ctaBtn').addEventListener('mouseenter',()=>{ring.style.width='80px';ring.style.height='80px';ring.style.borderColor='var(--rose)';});
document.getElementById('ctaBtn').addEventListener('mouseleave',()=>{ring.style.width='32px';ring.style.height='32px';ring.style.borderColor='';});

})();
</script>
